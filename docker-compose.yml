# InvokeBoard — local / single-host Docker stack.
#
# Topology: the `web` (nginx) container serves the SPA AND reverse-proxies the
# two MCP HTTP bridges, so the browser talks to ONE origin (http://localhost:8080)
# and no CORS is involved.
#
#   ┌────────────┐   /jira/*   ┌──────────────┐
#   │  browser   │────────────▶│  web (nginx) │──▶ jira   :4001
#   │ :8080      │   /github/* │  SPA + proxy │──▶ github :4002
#   └────────────┘             └──────────────┘
#
# Quick start:
#   cp .env.docker.example .env     # then fill in real Jira / GitHub creds
#   docker compose up --build
#   open http://localhost:8080
#
# NOTE: the stdio MCP servers (for VS Code Copilot) are intentionally NOT
# containerized — Copilot launches them locally. See docs/ARCHITECTURE.md.

services:
  jira:
    build:
      context: .
      dockerfile: docker/jira.Dockerfile
    image: invokeboard/mcp-jira:latest
    env_file: .env
    environment:
      # Persist the host-local JSON stores on a named volume (defaults otherwise
      # live inside the package dir and would be lost on container rebuild).
      JIRA_LEAVES_FILE: /data/.invokeboard-leaves.json
      JIRA_TEAM_FILE: /data/.invokeboard-team.json
      MCP_JIRA_HTTP_PORT: "4001"
      # v1.65 (ADR-077): production storage option — ALL 11 stores in one sqlite file on the
      # volume (fixes every store, not just leaves/team, surviving rebuilds). Needs the
      # node-gyp toolchain in docker/jira.Dockerfile to compile better-sqlite3 (v1.65 hotfix).
      STORAGE_DRIVER: sqlite
      STORAGE_SQLITE_FILE: /data/.invokeboard-stores.sqlite
    volumes:
      - invokeboard-data:/data
    ports:
      - "4001:4001"   # optional — direct API access for curl / debugging
    restart: unless-stopped

  github:
    build:
      context: .
      dockerfile: docker/github.Dockerfile
    image: invokeboard/mcp-github:latest
    env_file: .env
    environment:
      MCP_GITHUB_HTTP_PORT: "4002"
    ports:
      - "4002:4002"   # optional — direct API access for curl / debugging
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Same-origin proxy paths — nginx routes these to the bridge containers.
        VITE_MCP_JIRA_URL: /jira
        VITE_MCP_GITHUB_URL: /github
    image: invokeboard/web:latest
    depends_on:
      - jira
      - github
    ports:
      - "8080:80"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped

volumes:
  invokeboard-data:
