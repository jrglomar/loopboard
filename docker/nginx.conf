# InvokeBoard — web tier.
# Serves the SPA and reverse-proxies the two MCP HTTP bridges so the browser
# talks to a SINGLE origin (same-origin → no CORS needed on the bridges).
#
# The SPA calls `${VITE_MCP_JIRA_URL}/api/...` = `/jira/api/...` (and `/github/...`).
# The trailing slash on proxy_pass strips the `/jira` (or `/github`) prefix, so
# `/jira/api/health` → `http://jira:4001/api/health`.

upstream jira_bridge   { server jira:4001; }
upstream github_bridge { server github:4002; }

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Static assets (Vite emits hashed filenames → safe to cache hard).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MCP Jira bridge (tools + AI endpoints + /api/health → boards).
    location /jira/ {
        proxy_pass         http://jira_bridge/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # MCP GitHub bridge (PR tools).
    location /github/ {
        proxy_pass         http://github_bridge/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA client-side routing — everything else falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
